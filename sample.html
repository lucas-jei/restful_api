<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 등록 테스트</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        color: #172033;
        background: #f4f7fb;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(760px, 100%);
        margin: 0 auto;
        padding: 40px 18px;
      }

      h1 {
        margin: 0 0 24px;
        font-size: 32px;
        line-height: 1.2;
      }

      form,
      .result {
        border: 1px solid #d8e1ec;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 16px 40px rgba(23, 43, 77, 0.08);
      }

      form {
        display: grid;
        gap: 18px;
        padding: 24px;
      }

      label {
        display: grid;
        gap: 8px;
        font-weight: 800;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #cbd7e3;
        border-radius: 6px;
        color: #172033;
        background: #fbfdff;
        font: inherit;
        outline: none;
      }

      input {
        height: 44px;
        padding: 0 12px;
      }

      textarea {
        min-height: 180px;
        padding: 12px;
        resize: vertical;
        line-height: 1.6;
      }

      input:focus,
      textarea:focus {
        border-color: #2f7fc1;
        box-shadow: 0 0 0 3px rgba(47, 127, 193, 0.16);
      }

      button {
        display: inline-flex;
        height: 44px;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        background: #1769aa;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.56;
      }

      .status {
        margin: 16px 0 0;
        padding: 12px 14px;
        border-radius: 6px;
        font-weight: 700;
      }

      .status.success {
        border: 1px solid #b9ddc9;
        color: #17613a;
        background: #eef8f2;
      }

      .status.error {
        border: 1px solid #f1c6c6;
        color: #9d2c2c;
        background: #fff1f1;
      }

      .result {
        margin-top: 18px;
        padding: 18px;
      }

      pre {
        overflow-x: auto;
        margin: 0;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>게시글 등록 테스트</h1>

      <form id="post-form">
        <label>
          API 주소
          <input id="api-base-url" type="url" value="http://127.0.0.1:3080" required />
        </label>

        <label>
          API 키
          <input id="api-key" type="password" placeholder="API_KEY" required />
        </label>

        <label>
          제목
          <input id="title" type="text" placeholder="제목을 입력하세요" maxlength="255" required />
        </label>

        <label>
          작성자
          <input id="author" type="text" placeholder="작성자" maxlength="100" required />
        </label>

        <label>
          본문
          <textarea id="content" placeholder="본문을 입력하세요" required></textarea>
        </label>

        <button id="submit-button" type="submit">등록</button>
      </form>

      <div id="status"></div>
      <section id="result" class="result" hidden>
        <pre id="result-json"></pre>
      </section>
    </main>

    <script type="module">
      const form = document.querySelector("#post-form");
      const submitButton = document.querySelector("#submit-button");
      const statusBox = document.querySelector("#status");
      const resultPanel = document.querySelector("#result");
      const resultJson = document.querySelector("#result-json");

      const fields = {
        apiBaseUrl: document.querySelector("#api-base-url"),
        apiKey: document.querySelector("#api-key"),
        title: document.querySelector("#title"),
        author: document.querySelector("#author"),
        content: document.querySelector("#content"),
      };

      function getValue(input) {
        return input.value.trim();
      }

      function setStatus(type, message) {
        statusBox.className = `status ${type}`;
        statusBox.textContent = message;
      }

      function clearStatus() {
        statusBox.className = "";
        statusBox.textContent = "";
      }

      async function readError(response, fallbackMessage) {
        const body = await response.json().catch(() => null);
        return typeof body?.detail === "string" ? body.detail : fallbackMessage;
      }

      async function issueAccessToken(apiBaseUrl, apiKey) {
        const response = await fetch(`${apiBaseUrl}/auth/access-token`, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${apiKey}`,
          },
        });

        if (!response.ok) {
          throw new Error(await readError(response, "액세스 토큰 발급에 실패했습니다."));
        }

        return response.json();
      }

      async function createPost(apiBaseUrl, accessToken, payload) {
        const response = await fetch(`${apiBaseUrl}/posts`, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${accessToken}`,
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          throw new Error(await readError(response, "게시글 등록에 실패했습니다."));
        }

        return response.json();
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearStatus();
        resultPanel.hidden = true;
        resultJson.textContent = "";
        submitButton.disabled = true;
        submitButton.textContent = "등록 중";

        try {
          const apiBaseUrl = getValue(fields.apiBaseUrl).replace(/\/$/, "");
          const apiKey = getValue(fields.apiKey);
          const tokenResponse = await issueAccessToken(apiBaseUrl, apiKey);
          const post = await createPost(apiBaseUrl, tokenResponse.access_token, {
            title: getValue(fields.title),
            author: getValue(fields.author),
            content: getValue(fields.content),
          });

          setStatus("success", "게시글이 등록되었습니다.");
          resultJson.textContent = JSON.stringify(post, null, 2);
          resultPanel.hidden = false;
          fields.title.value = "";
          fields.content.value = "";
        } catch (error) {
          setStatus("error", error instanceof Error ? error.message : "알 수 없는 오류가 발생했습니다.");
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "등록";
        }
      });
    </script>
  </body>
</html>
